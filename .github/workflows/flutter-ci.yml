name: Flutter CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.6
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Web
        run: flutter build web --release --dart-define=API_BASE_URL=${{ vars.API_BASE_URL }}

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: flutter_app/build/web
